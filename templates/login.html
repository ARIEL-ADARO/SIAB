<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIAB - Iniciar Sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #7a0000 0%, #a50000 50%, #1a1a1a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: white;
            border-radius: 16px;
            padding: 2.5rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }
        .logo-area {
            text-align: center;
            margin-bottom: 2rem;
        }
        .logo-area .icono {
            font-size: 3.5rem;
            color: #a50000;
        }
        .logo-area h4 {
            color: #a50000;
            font-weight: 700;
            margin: 0.5rem 0 0.2rem;
        }
        .logo-area p {
            color: #666;
            font-size: 0.85rem;
            margin: 0;
        }
        .form-control:focus {
            border-color: #a50000;
            box-shadow: 0 0 0 0.2rem rgba(165,0,0,0.15);
        }
        .btn-login {
            background: #a50000;
            border: none;
            color: white;
            width: 100%;
            padding: 0.75rem;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            margin-top: 0.5rem;
        }
        .btn-login:hover { background: #7a0000; color: white; }
        .input-group-text { background: #f8f8f8; }
        .footer-login {
            text-align: center;
            color: rgba(255,255,255,0.6);
            font-size: 0.78rem;
            margin-top: 1.5rem;
        }
    </style>
</head>
<body>

<div>
    <div class="login-card">
        <div class="logo-area">
            <div class="icono"><i class="bi bi-shield-fill"></i></div>
            <h4>SIAB</h4>
            <p>Sistema Informático Automatizado de Bomberos</p>
            <small class="text-muted">Bomberos Voluntarios de Almafuerte</small>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }} py-2 small">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="mb-3">
                <label class="form-label fw-semibold">Usuario</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input type="text" name="username" class="form-control"
                           placeholder="Ingresá tu usuario" required autofocus>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Contraseña</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" name="password" class="form-control"
                           placeholder="Ingresá tu contraseña" required>
                </div>
            </div>
            <button type="submit" class="btn-login">
                <i class="bi bi-box-arrow-in-right"></i> Ingresar
            </button>
        </form>
    </div>

    <div class="footer-login">
        SIAB v2.0 — Etapa 2 &copy; 2026
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
