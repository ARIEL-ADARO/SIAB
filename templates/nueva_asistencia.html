<div class="mb-3">
    <label class="form-label fw-bold">Tipo de Evento</label>
    <select name="tipo" class="form-select" id="tipo_evento">
        <option value="ACADEMIA">Academia</option>
        <option value="CAPACITACION">Capacitación</option>
        <option value="OPERATIVO">Operativo</option>
    </select>
</div>

<div id="config_calificacion" class="card mb-3 border-info shadow-sm" style="display: none;">
    <div class="card-header bg-info text-white py-2">
        <i class="bi bi-shield-check"></i> Configuración de Evaluación Especial
    </div>
    <div class="card-body">
        <div class="form-check form-switch mb-2">
            <input class="form-check-input" type="checkbox" name="califica_oficiales" id="swOficiales" value="1">
            <label class="form-check-label" for="swOficiales">Calificar Oficiales</label>
        </div>
        <div class="form-check form-switch mb-2">
            <input class="form-check-input" type="checkbox" name="califica_suboficiales" id="swSuboficiales" value="1">
            <label class="form-check-label" for="swSuboficiales">Calificar Suboficiales</label>
        </div>
        <div class="form-check form-switch">
            <input class="form-check-input" type="checkbox" name="califica_encargados" id="swEncargados" value="1">
            <label class="form-check-label" for="swEncargados">Calificar Encargados</label>
        </div>
    </div>
</div>

<script>
document.getElementById('tipo_evento').addEventListener('change', function() {
    const config = document.getElementById('config_calificacion');
    config.style.display = (this.value === 'CAPACITACION') ? 'block' : 'none';
});
</script>
