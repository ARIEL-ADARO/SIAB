{% extends "base.html" %}
{% block titulo %}Departamentos{% endblock %}

{% block contenido %}
<div class="d-flex align-items-center justify-content-between mb-4">
    <div>
        <h4 class="mb-0 fw-bold"><i class="bi bi-diagram-3"></i> Departamentos</h4>
        <small class="text-muted">Grupos especializados del cuerpo</small>
    </div>
</div>

<div class="row g-3">
{% for d in departamentos %}
<div class="col-12 col-md-6 col-lg-4">
    <div class="card h-100">
        <div class="card-body">
            <div class="d-flex align-items-center justify-content-between mb-2">
                <h6 class="fw-bold mb-0">{{ d.nombre }}</h6>
                <span class="badge bg-primary">{{ d.miembros }} miembros</span>
            </div>
            <p class="text-muted small mb-3">{{ d.descripcion or '—' }}</p>
            <a href="{{ url_for('miembros_departamento', depto_id=d.id) }}"
               class="btn btn-sm btn-primary w-100">
                <i class="bi bi-people"></i> Ver y gestionar miembros
            </a>
        </div>
    </div>
</div>
{% endfor %}
</div>
{% endblock %}
